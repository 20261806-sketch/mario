<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이어 마리오 점프 게임 🔥🍄</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #5C94FC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        h1 { color: white; text-shadow: 2px 2px 0 #000; margin-bottom: 10px; }
        #game-wrapper {
            position: relative;
        }
        canvas {
            background-color: #5C94FC;
            border-bottom: 40px solid #c84c0c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 5px 5px 0 0;
            display: block;
        }
        #game-wrapper::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            height: 40px;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                              linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.1;
            pointer-events: none;
        }
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }
        #gameOverScreen h2 { font-size: 40px; margin: 0 0 20px 0; color: #ffeb3b; text-shadow: 2px 2px 0 #000;}
        #restartBtn {
            padding: 10px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e52521;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            transition: transform 0.1s;
        }
        #restartBtn:active { transform: scale(0.95); }
        .instructions { margin-top: 15px; color: white; font-weight: bold; text-shadow: 1px 1px 0 #000; text-align: center; line-height: 1.5;}
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

    <h1>파이어 마리오 런 🔥</h1>
    
    <div id="game-wrapper">
        <div id="scoreBoard">점수: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        
        <div id="gameOverScreen">
            <h2>게임 오버!</h2>
            <button id="restartBtn" onclick="resetGame()">다시 하기</button>
        </div>
    </div>
    
    <div class="instructions">
        [스페이스바] 점프 <span class="highlight">(공중에서 한 번 더 누르면 이단 점프!)</span><br>
        <span class="highlight">[Z 키]</span> 파이어볼 발사 (몬스터 공격)
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');

        let frame = 0;
        let score = 0;
        let gameSpeed = 6;
        let isGameOver = false;
        let animationId;

        // 파워업 마리오 객체
        const player = {
            x: 50,
            y: 200,
            width: 30,
            height: 40,
            dy: 0,
            jumpPower: -11,
            gravity: 0.6,
            grounded: false,
            jumps: 0,       // 이단 점프를 위한 점프 횟수 기록
            maxJumps: 2     // 최대 점프 횟수
        };

        let obstacles = [];
        let fireballs = []; // 파이어볼 배열

        function drawPlayer() {
            const x = player.x;
            const y = player.y;
            const w = player.width;
            const h = player.height;

            // 파이어 마리오 디자인 (모자: 흰색, 옷: 흰색, 멜빵: 빨강)
            
            // 모자 (흰색)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x, y, w, h * 0.3);
            ctx.fillRect(x + w, y + h * 0.1, w * 0.3, h * 0.1);

            // 얼굴 (살구색)
            ctx.fillStyle = '#ffcca6';
            ctx.fillRect(x, y + h * 0.3, w, h * 0.3);

            // 콧수염
            ctx.fillStyle = 'black';
            ctx.fillRect(x + w * 0.5, y + h * 0.45, w * 0.6, h * 0.1);

            // 멜빵바지 (빨강)
            ctx.fillStyle = '#e52521';
            ctx.fillRect(x, y + h * 0.6, w, h * 0.4);

            // 팔 (흰색)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x - w * 0.2, y + h * 0.6, w * 0.3, h * 0.2);

            // 다리 애니메이션 (바닥에 있을 때만 움직임)
            ctx.fillStyle = '#e52521'; // 다리 색
            if (player.grounded) {
                let legOffset = (Math.floor(frame / 6) % 2 === 0) ? 5 : 0;
                // 앞다리
                ctx.fillRect(x + w * 0.2, y + h - 5 + (5 - legOffset), w * 0.3, 5);
                // 뒷다리
                ctx.fillRect(x + w * 0.6, y + h - 5 + legOffset, w * 0.3, 5);
            } else {
                // 점프 중 다리 고정
                ctx.fillRect(x + w * 0.2, y + h - 5, w * 0.3, 5);
                ctx.fillRect(x + w * 0.6, y + h - 10, w * 0.3, 5);
            }
        }

        // 파이어볼 그리기 및 로직
        function handleFireballs() {
            for (let i = fireballs.length - 1; i >= 0; i--) {
                let fb = fireballs[i];
                fb.x += fb.speed; // 오른쪽으로 이동

                // 불꽃 그리기 (주황/노랑)
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
                ctx.fillStyle = (frame % 4 < 2) ? '#ff5722' : '#ffeb3b';
                ctx.fill();
                ctx.closePath();

                // 화면 밖으로 나가면 제거
                if (fb.x > canvas.width) {
                    fireballs.splice(i, 1);
                    continue;
                }

                // 몬스터와 파이어볼 충돌 검사
                for (let j = obstacles.length - 1; j >= 0; j--) {
                    let obs = obstacles[j];
                    if (obs.type === 'monster') {
                        // 간단한 원형-사각형 충돌 체크
                        let distX = Math.abs(fb.x - obs.x - obs.width / 2);
                        let distY = Math.abs(fb.y - obs.y - obs.height / 2);

                        if (distX <= (obs.width / 2 + fb.radius) && distY <= (obs.height / 2 + fb.radius)) {
                            // 몬스터 처치!
                            obstacles.splice(j, 1);
                            fireballs.splice(i, 1);
                            score += 200; // 보너스 점수
                            scoreElement.innerText = score;
                            break; // 불꽃 하나당 몬스터 하나
                        }
                    }
                }
            }
        }

        // 파이어볼 발사
        function shootFireball() {
            if (!isGameOver && fireballs.length < 3) { // 화면에 최대 3개까지만
                fireballs.push({
                    x: player.x + player.width,
                    y: player.y + player.height * 0.5,
                    radius: 6,
                    speed: 12
                });
            }
        }

        function drawObstacles() {
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed; 

                if (obs.type === 'pipe') {
                    // 토관
                    ctx.fillStyle = '#00a800'; 
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillRect(obs.x - 5, obs.y, obs.width + 10, 20);
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.strokeRect(obs.x - 5, obs.y, obs.width + 10, 20);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(obs.x + 5, obs.y, 5, obs.height);
                } else if (obs.type === 'monster') {
                    // 몬스터
                    const mx = obs.x, my = obs.y, mw = obs.width, mh = obs.height;
                    ctx.fillStyle = '#a52a2a';
                    ctx.beginPath();
                    ctx.moveTo(mx, my + mh); ctx.lineTo(mx + mw, my + mh);
                    ctx.lineTo(mx + mw * 0.8, my); ctx.lineTo(mx + mw * 0.2, my);
                    ctx.closePath();
                    ctx.fill(); ctx.strokeStyle = 'black'; ctx.
